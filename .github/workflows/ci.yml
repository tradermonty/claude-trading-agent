name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install linters
        run: pip install "ruff==0.9.6" codespell

      - name: Ruff check
        run: ruff check skills/ agent/ config/ scripts/ app.py bootstrap.py

      - name: Ruff format check
        run: ruff format --check skills/ agent/ config/ scripts/ app.py bootstrap.py

      - name: Codespell
        run: codespell --toml pyproject.toml skills/ agent/ config/ scripts/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # Run each skill's tests in isolation to avoid module name collisions
      # (scorer.py, calculators/, report_generator.py exist in multiple skills).
      - name: Test breakout-trade-planner
        run: >
          python -m pytest skills/breakout-trade-planner/scripts/tests/ -v
          --cov=skills/breakout-trade-planner/scripts
          --cov-report=term-missing

      - name: Test earnings-calendar
        run: >
          python -m pytest skills/earnings-calendar/scripts/tests/ -v
          --cov=skills/earnings-calendar/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test economic-calendar-fetcher
        run: >
          python -m pytest skills/economic-calendar-fetcher/scripts/tests/ -v
          --cov=skills/economic-calendar-fetcher/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test ftd-detector
        run: >
          python -m pytest skills/ftd-detector/scripts/tests/ -v
          --cov=skills/ftd-detector/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test macro-regime-detector
        run: >
          python -m pytest skills/macro-regime-detector/scripts/tests/ -v
          --cov=skills/macro-regime-detector/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test market-breadth-analyzer
        run: >
          python -m pytest skills/market-breadth-analyzer/scripts/tests/ -v
          --cov=skills/market-breadth-analyzer/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test vcp-screener
        run: >
          python -m pytest skills/vcp-screener/scripts/tests/ -v
          --cov=skills/vcp-screener/scripts
          --cov-report=term-missing
          --cov-append

      # Known failures: theme-detector, canslim-screener
      - name: Test theme-detector (known failures)
        continue-on-error: true
        run: >
          python -m pytest skills/theme-detector/scripts/tests/ -v
          --cov=skills/theme-detector/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test canslim-screener (known failures)
        continue-on-error: true
        run: >
          python -m pytest skills/canslim-screener/scripts/tests/ -v
          --cov=skills/canslim-screener/scripts
          --cov-report=term-missing
          --cov-append

      - name: Coverage summary
        if: always()
        run: python -m coverage report

      - name: Upload coverage report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install security tools
        run: pip install "bandit[toml]>=1.9.0" "detect-secrets>=1.5.0"

      - name: Bandit SAST scan
        run: bandit -c pyproject.toml -r skills/ agent/ config/ --exclude "*/tests/*"

      - name: Detect secrets check
        run: |
          detect-secrets scan \
            --exclude-files '\.env$|\.json$|\.csv$|\.md$|\.zip$|\.baseline$' \
            > /tmp/new_scan.json
          if [ -f .secrets.baseline ]; then
            python3 -c "
          import json, sys
          with open('.secrets.baseline') as f: old = json.load(f)
          with open('/tmp/new_scan.json') as f: new = json.load(f)
          old_set = {(p, i['hashed_secret'], i['line_number'])
                     for p, items in old.get('results', {}).items() for i in items}
          new_set = {(p, i['hashed_secret'], i['line_number'])
                     for p, items in new.get('results', {}).items() for i in items}
          diff = new_set - old_set
          if diff:
              print(f'ERROR: {len(diff)} new secret(s) not in baseline:')
              for p, h, ln in sorted(diff):
                  print(f'  {p}:{ln}')
              sys.exit(1)
          print(f'OK: {len(new_set)} known, 0 new')
          "
          else
            echo "No .secrets.baseline found — generating initial baseline"
            cp /tmp/new_scan.json .secrets.baseline
            echo "::warning::Generated initial .secrets.baseline — commit this file"
          fi
